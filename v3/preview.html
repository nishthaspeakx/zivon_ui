<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Zivon — States</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0A0A0F; color:#EDEDF2; min-height:100vh;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,system-ui,sans-serif;
    display:flex; flex-direction:column; align-items:center;
    padding:28px 16px 40px; -webkit-font-smoothing:antialiased;
  }
  .wordmark { display:none; }
  .stage { position:relative; width:min(340px,86vw); aspect-ratio:9/16; background:transparent; }
  video { width:100%; height:100%; object-fit:cover; display:block; opacity:0; transition:opacity .18s ease; background:transparent;
    -webkit-mask-image: linear-gradient(to bottom, #000 0%, #000 66%, transparent 92%);
            mask-image: linear-gradient(to bottom, #000 0%, #000 66%, transparent 92%);
  }
  video.show { opacity:1; }
  .label { margin:20px 0 6px; font-size:22px; letter-spacing:.18em; text-transform:uppercase; font-weight:800; opacity:.95; min-height:26px; text-align:center; }
  .buttons { display:flex; flex-wrap:wrap; gap:12px; justify-content:center; margin-top:22px; max-width:420px; }
  button {
    cursor:pointer; border:1px solid rgba(255,255,255,.14); background:rgba(255,255,255,.05);
    color:#EDEDF2; font-size:14px; font-weight:500; padding:13px 24px; border-radius:999px;
    transition:all .18s ease; min-width:120px;
  }
  button:hover { background:rgba(255,255,255,.1); border-color:rgba(255,255,255,.28); }
  button:active { transform:scale(.96); }
  button.active { box-shadow:0 0 0 1px currentColor, 0 0 20px -4px currentColor; }
  button[data-s="idle"].active       { color:#6f86ff; background:rgba(90,110,255,.16); }
  button[data-s="listening"].active  { color:#42dcff; background:rgba(60,210,255,.16); }
  button[data-s="thinking"].active   { color:#c66bff; background:rgba(180,80,255,.16); }
  button[data-s="responding"].active { color:#ffc24d; background:rgba(255,180,60,.16); }
  .loopwrap { margin-top:18px; font-size:12px; opacity:.55; display:flex; gap:7px; align-items:center; }
  .audio-toggle { position:fixed; top:18px; right:18px; z-index:10;
    width:42px; height:42px; border-radius:50%;
    background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12);
    color:#EDEDF2; cursor:pointer; font-size:18px;
    display:flex; align-items:center; justify-content:center;
    backdrop-filter:blur(8px); transition:all .2s; }
  .audio-toggle:hover { background:rgba(255,255,255,0.12); }
  .audio-toggle.muted { opacity:.45; }
</style>
</head>
<body>
  <div class="wordmark">ZIVON</div>

  <div class="stage">
    <video id="vid" playsinline autoplay muted loop preload="auto"></video>
  </div>

  <div class="label" id="label">ZIVON — Think and Ship</div>

  <div class="buttons">
    <button data-s="idle"       data-src="0_idle.mp4">Idle</button>
    <button data-s="listening"  data-src="1_listening.mp4">Listening</button>
    <button data-s="thinking"   data-src="2_thinking.mp4">Thinking</button>
    <button data-s="responding" data-src="3_responding.mp4">Shipping</button>
  </div>

  <button class="audio-toggle" id="audioToggle" aria-label="Toggle sound" title="Toggle sound">🔊</button>

  <script>
    const vid = document.getElementById('vid');
    const btns = [...document.querySelectorAll('button[data-s]')];

    // ---- Web Audio: synthesize per-state earcons ----
    const Sound = (() => {
      let ctx = null, master = null, muted = false, ambientStop = null;
      async function ensure(){
        if (!ctx) {
          ctx = new (window.AudioContext || window.webkitAudioContext)();
          master = ctx.createGain();
          master.gain.value = 0.9;             // master ~ unity
          master.connect(ctx.destination);
        }
        if (ctx.state === 'suspended') {
          try { await ctx.resume(); } catch(e) {}
        }
        return ctx;
      }
      async function tone(freq, start, dur, type='sine', peakGain=0.55){
        const c = await ensure();
        const o = c.createOscillator();
        const g = c.createGain();
        o.type = type; o.frequency.value = freq;
        o.connect(g); g.connect(master);
        const t0 = c.currentTime + start;
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.exponentialRampToValueAtTime(peakGain, t0 + 0.04);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
        o.start(t0); o.stop(t0 + dur + 0.05);
      }
      async function pad(freqs, duration, peakGain=0.18){
        const c = await ensure();
        const stops = [];
        freqs.forEach(f => {
          const o = c.createOscillator();
          const g = c.createGain();
          o.type = 'sine'; o.frequency.value = f;
          o.connect(g); g.connect(master);
          const t0 = c.currentTime;
          g.gain.setValueAtTime(0.0001, t0);
          g.gain.exponentialRampToValueAtTime(peakGain, t0 + 0.8);
          g.gain.setValueAtTime(peakGain, t0 + duration - 0.6);
          g.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
          o.start(t0); o.stop(t0 + duration + 0.05);
          stops.push(()=> { try{g.gain.cancelScheduledValues(c.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + 0.3); o.stop(c.currentTime + 0.35);}catch(e){} });
        });
        return () => stops.forEach(s => s());
      }
      async function stopAmbient(){ if (ambientStop) { const fn = await ambientStop; fn(); ambientStop = null; } }

      // Per-state earcons. Audible peakGain values (~0.3-0.6). Master = 0.9.
      const earcons = {
        async idle(){
          // soft low warm pad — present, unobtrusive
          tone(220, 0,    1.4, 'sine', 0.25); // A3
          tone(330, 0.05, 1.4, 'sine', 0.18); // E4
          ambientStop = pad([110, 165], 12, 0.08);
        },
        async listening(){
          // rising bright chime — "I hear you"
          tone(523.25, 0,    0.5, 'sine',     0.55); // C5
          tone(659.25, 0.12, 0.5, 'sine',     0.55); // E5
          tone(783.99, 0.24, 0.7, 'triangle', 0.50); // G5
          ambientStop = pad([523.25, 783.99], 14, 0.05);
        },
        async thinking(){
          // pulsing reasoning hum — slightly mysterious
          tone(440.00, 0,    0.55, 'triangle', 0.40); // A4
          tone(554.37, 0.18, 0.55, 'triangle', 0.35); // C#5
          tone(659.25, 0.36, 0.7,  'triangle', 0.40); // E5
          ambientStop = pad([220, 277.18, 329.63], 16, 0.07);
        },
        async shipping(){
          // bright triumphant arpeggio — the win
          tone(523.25, 0,    0.45, 'triangle', 0.55); // C5
          tone(659.25, 0.10, 0.45, 'triangle', 0.55); // E5
          tone(783.99, 0.20, 0.50, 'triangle', 0.60); // G5
          tone(1046.50,0.30, 0.85, 'sine',     0.65); // C6 bright
          ambientStop = pad([523.25, 659.25, 783.99], 14, 0.06);
        }
      };
      async function play(state){
        if (muted) return;
        await stopAmbient();
        const fn = earcons[state];
        if (fn) fn();
      }
      function setMuted(m){
        muted = m;
        if (m) stopAmbient();
      }
      return { play, setMuted, isMuted: () => muted, resume: ensure };
    })();

    // ---- audio toggle UI ----
    const audioBtn = document.getElementById('audioToggle');
    audioBtn.addEventListener('click', async () => {
      await Sound.resume();      // unlock the AudioContext on user gesture
      const next = !Sound.isMuted();
      Sound.setMuted(next);
      audioBtn.classList.toggle('muted', next);
      audioBtn.textContent = next ? '🔇' : '🔊';
      // brief audible confirmation when unmuting
      if (!next) Sound.play('listening');
    });

    let swapToken = 0;
    function play(btn){
      btns.forEach(b=>b.classList.toggle('active', b===btn));
      Sound.play(btn.dataset.s);

      const token = ++swapToken;
      vid.classList.remove('show');   // hide immediately so prev frame doesn't show

      // wait for the fade-out, then swap src and only reveal once new frame decoded
      setTimeout(() => {
        if (token !== swapToken) return; // a newer click happened, abort
        vid.muted = true;
        vid.loop = true;
        vid.removeAttribute('src');
        vid.load();                     // clear any prior frame
        vid.src = btn.dataset.src + '?v=' + Date.now();
        vid.load();

        const reveal = () => {
          if (token !== swapToken) return;
          vid.classList.add('show');
          vid.play().catch(() => {});
        };
        // 'loadeddata' fires once the first frame is decoded
        vid.addEventListener('loadeddata', reveal, { once: true });
      }, 190);
    }
    btns.forEach(b => b.addEventListener('click', ()=>play(b)));

    // start on idle (visual only — sound waits for a real user gesture)
    btns.forEach(b=>b.classList.toggle('active', b===btns[0]));
    (function bootVisual(){
      const token = ++swapToken;
      vid.classList.remove('show');
      setTimeout(() => {
        vid.muted = true; vid.loop = true;
        vid.src = btns[0].dataset.src + '?v=' + Date.now();
        vid.load();
        vid.addEventListener('loadeddata', () => {
          if (token !== swapToken) return;
          vid.classList.add('show');
          vid.play().catch(()=>{});
        }, { once:true });
      }, 50);
    })();
  </script>
</body>
</html>
